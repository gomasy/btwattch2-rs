[package]
name = "btwattch2"
version = "0.1.1"
edition = "2024"

[dependencies]
anyhow = "1"
btleplug = "0.12"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
futures = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "signal"] }
uuid = "1"

[[bin]]
name = "btwattch2"
path = "src/main.rs"

[[bin]]
name = "mackerel"
path = "src/bin/mackerel.rs"
